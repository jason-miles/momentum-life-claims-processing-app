# Databricks App resource — the "Assessment Analytics Portal".
#
# React + FastAPI single-process app (src/app_react): FastAPI serves the built
# React SPA from webroot/ and the /api routes. Reads gold via a serverless SQL
# warehouse, calls Claude Sonnet (synopsis agent / ai_query), and embeds Genie.
# (The earlier Streamlit version lives in src/app for reference.)
resources:
  apps:
    momentum_claims_portal:
      name: momentum-claims-portal
      description: "Momentum Life — Assessment Analytics Portal (claims processing copilot)."
      source_code_path: ../src/app_react
      resources:
        - name: sql_warehouse
          description: Serverless warehouse for gold reads, dashboards and Genie.
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: llm
          description: Claude Sonnet serving endpoint (fronted by AI Gateway) for the synopsis agent.
          serving_endpoint:
            name: ${var.llm_endpoint}
            permission: CAN_QUERY
        - name: genie_space
          description: Genie space "Momentum Claims Analyst" — the app SP must be able to run it (AI Copilot + Exec pages).
          genie_space:
            name: Momentum Claims Analyst
            space_id: ${var.genie_space_id}
            permission: CAN_RUN
